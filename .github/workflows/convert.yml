name: Convert and Update M3U

on:
  schedule:
    - cron: '0 */12 * * *' # Runs every 12 hours
  workflow_dispatch:       # Allows you to click "Run workflow" manually

jobs:
  convert:
    runs-on: ubuntu-latest
    env:
      # Fixes the Node.js deprecation warning you encountered
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Maps your GitHub Secret to the script's environment
      M3U_SOURCE_URL: ${{ secrets.M3U_SOURCE_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Conversion Script
        run: python convert.py

      - name: Commit and Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add playlist.m3u
          if git diff --cached --quiet; then
            echo "No changes to the playlist."
          else
            git commit -m "Automated playlist update [skip ci]"
            git push
          fi
